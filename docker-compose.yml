services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: embassy
      POSTGRES_PASSWORD: embassy
      POSTGRES_DB: embassy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embassy -d embassy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.main_bot"]
    restart: unless-stopped

  worker:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.main_worker"]
    restart: unless-stopped
    shm_size: "1gb"

volumes:
  postgres_data:
